pre-commit:
  jobs:
    - name: reuse-lint
      run: |
        if ! reuse lint; then
          echo "Downloading missing licenses..."
          reuse download --all
          git add LICENSES/
          echo "Missing licenses downloaded and staged."
          # Re-check after fix
          reuse lint
        fi

    - name: checkpatch
      run: |
        git diff --cached -- '*.cpp' '*.h' '*.hpp' 'CMakeLists.txt' '*.cmake' | perl scripts/checkpatch.pl --diff --summary
      skip:
        - merge
        - rebase

pre-push:
  jobs:
    - name: reuse-lint
      run: |
        if ! reuse lint; then
          echo "Downloading missing licenses..."
          reuse download --all
          git add LICENSES/
          echo "Missing licenses downloaded and staged."
          reuse lint
        fi
