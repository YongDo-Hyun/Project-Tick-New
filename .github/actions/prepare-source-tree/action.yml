name: Prepare Source Tree
description: >
  Copy a project directory into a clean staging area, optionally bundle
  docs/handbook/<project> and an extra library directory into the tree.

inputs:
  project:
    description: "Project directory name (e.g. meshmc, neozip)"
    required: true
  bundle-handbook:
    description: "Bundle docs/handbook/<project> into the source tree if it exists"
    required: false
    default: "true"
  bundle-libraries:
    description: >
      Newline-separated list of library bundles in "src:dst" format.
      Each line maps a source directory to a destination path inside
      the source tree (e.g. "libnbtplusplus:libraries/libnbtplusplus").
    required: false
    default: ""

outputs:
  source-dir:
    description: "Path to the prepared source tree ready for archiving"
    value: ${{ steps.prepare.outputs.source-dir }}

runs:
  using: composite
  steps:
    - name: Prepare source tree
      id: prepare
      shell: bash
      env:
        PROJECT: ${{ inputs.project }}
        BUNDLE_HANDBOOK: ${{ inputs.bundle-handbook }}
        BUNDLE_LIBRARIES: ${{ inputs.bundle-libraries }}
      run: |
        set -euo pipefail

        SRC_STAGE="source-stage"
        mkdir -p "$SRC_STAGE"
        cp -a "$PROJECT" "$SRC_STAGE/$PROJECT"

        # Optionally bundle docs/handbook/<project>
        if [ "$BUNDLE_HANDBOOK" = "true" ] && [ -d "docs/handbook/$PROJECT" ]; then
          mkdir -p "$SRC_STAGE/$PROJECT/docs/handbook"
          cp -a "docs/handbook/$PROJECT/." "$SRC_STAGE/$PROJECT/docs/handbook/"
        fi

        # Bundle library directories (newline-separated "src:dst" pairs)
        if [ -n "$BUNDLE_LIBRARIES" ]; then
          while IFS= read -r entry; do
            entry="$(echo "$entry" | xargs)"
            [ -n "$entry" ] || continue
            lib_src="${entry%%:*}"
            lib_dst="${entry#*:}"
            if [ -z "$lib_src" ] || [ -z "$lib_dst" ]; then
              echo "::error::Invalid bundle-libraries entry: '$entry' (expected 'src:dst')"
              exit 1
            fi
            echo "Bundling library: $lib_src -> $lib_dst"
            mkdir -p "$SRC_STAGE/$PROJECT/$lib_dst"
            cp -a "$lib_src/." "$SRC_STAGE/$PROJECT/$lib_dst/"
          done <<< "$BUNDLE_LIBRARIES"
        fi

        echo "source-dir=$SRC_STAGE/$PROJECT" >> "$GITHUB_OUTPUT"
