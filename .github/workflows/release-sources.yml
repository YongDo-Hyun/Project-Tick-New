name: "Release: Package Source Archives"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.2.3)"
        required: true

permissions: {}

jobs:

  meshmc_build:
    name: MeshMC Build
    uses: ./.github/workflows/meshmc-release.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets: inherit


  neozip_build:
    name: neozip Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC Win32
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32
            deploy-name: win-x86

          - name: Windows MSVC Win32 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32 -DZLIB_COMPAT=ON
            deploy-name: win-x86-compat

          - name: Windows MSVC Win64
            os: windows-latest
            compiler: cl
            cmake-args: -A x64
            deploy-name: win-x86-64

          - name: Windows MSVC Win64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A x64 -DZLIB_COMPAT=ON
            deploy-name: win-x86-64-compat

          - name: Windows MSVC ARM
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0
            deploy-name: win-arm

          - name: Windows MSVC ARM Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0 -DZLIB_COMPAT=ON
            deploy-name: win-arm-compat

          - name: Windows MSVC ARM64
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64
            deploy-name: win-arm64

          - name: Windows MSVC ARM64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64 -DZLIB_COMPAT=ON
            deploy-name: win-arm64-compat

          - name: Windows MSVC ARM64EC
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC
            deploy-name: win-arm64ec

          - name: Windows MSVC ARM64EC Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC -DZLIB_COMPAT=ON
            deploy-name: win-arm64ec-compat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          show-progress: 'false'

      - name: Install Windows 11 SDK (ARM)
        if: matrix.name == 'Windows MSVC ARM' || matrix.name == 'Windows MSVC ARM Compat'
        run: |
          # Windows 11 SDK (10.0.22621.2428)
          # https://developer.microsoft.com/en-us/windows/downloads/sdk-archive/index-legacy
          Invoke-WebRequest -Method Get -Uri https://go.microsoft.com/fwlink/p/?LinkId=2250105 -OutFile sdksetup.exe -UseBasicParsing
          Unblock-File sdksetup.exe
          Start-Process -Wait sdksetup.exe -ArgumentList "/q", "/norestart", "/ceip off"

      - name: Generate project files
        shell: bash
        working-directory: neozip
        run: |
          cmake . ${{ matrix.cmake-args }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_ENABLE_TESTS=ON \
            -DCMAKE_INSTALL_PREFIX=out \
            -DINSTALL_UTILS=ON
        env:
          CC: ${{ matrix.compiler }}
          CI: true

      - name: Compile source code
        working-directory: neozip
        run: cmake --build . -j5 --config Release --target install

      - name: Package release
        working-directory: neozip/out
        run: 7z a -tzip ../neozip-${{ matrix.deploy-name }}.zip bin include lib ../LICENSE.md ../PORTING.md ../README.md

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: neozip-${{ matrix.deploy-name }}
          path: neozip/neozip-${{ matrix.deploy-name }}.zip
          if-no-files-found: error

  meshmc_prepare_source:
    name: MeshMC Source Archives
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set version
        run: echo "VERSION=${{ inputs.version || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Patch CMakeLists.txt for bundled libraries
        shell: bash
        run: |
          git apply .github/patches/0001-GHA-RELEASE-Prepare-tarball-with-libraries-in-CMake.patch

      - name: Prepare source tree
        id: prepare
        uses: ./.github/actions/prepare-source-tree
        with:
          project: meshmc
          bundle-libraries: |
            classparser:libraries/classparser
            cmark:libraries/cmark
            ganalytics:libraries/ganalytics
            iconfix:libraries/iconfix
            javacheck:libraries/javacheck
            javalauncher:libraries/launcher
            katabasis:libraries/katabasis
            libnbtplusplus:libraries/libnbtplusplus
            LocalPeer:libraries/LocalPeer
            neozip:libraries/neozip
            optional-bare:libraries/optional-bare
            rainbow:libraries/rainbow
            systeminfo:libraries/systeminfo
            xz-embedded:libraries/xz-embedded

      - name: Package source archives
        uses: ./.github/actions/package-source
        with:
          project: meshmc
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: meshmc-source-archives
          path: release-artifacts/
          if-no-files-found: error

  package_sources:
    name: Source Archives (${{ matrix.project }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - cgit
          - cmark
          - corebinutils
          - forgewrapper
          - genqrcode
          - images4docker
          - json4cpp
          - libnbtplusplus
          - mnv
          - tomlplusplus
          - LocalPeer
          - classparser
          - ganalytics
          - iconfix
          - javacheck
          - javalauncher
          - katabasis
          - optional-bare
          - rainbow
          - systeminfo
          - xz-embedded
          - neozip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set version
        run: echo "VERSION=${{ inputs.version || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Prepare source tree
        id: prepare
        uses: ./.github/actions/prepare-source-tree
        with:
          project: ${{ matrix.project }}

      - name: Package source archives
        uses: ./.github/actions/package-source
        with:
          project: ${{ matrix.project }}
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: source-${{ matrix.project }}
          path: release-artifacts/
          if-no-files-found: error


  create_release:
    name: Create Release Draft
    needs: [meshmc_build, neozip_build, meshmc_prepare_source, package_sources]

    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for component version extraction)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            meshmc/CMakeLists.txt
            neozip/zlib.h.in
          sparse-checkout-cone-mode: false

      - name: Set version
        run: echo "VERSION=${{ inputs.version || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Generate components.json
        shell: bash
        run: |
          # Extract MeshMC version from CMakeLists.txt
          MESHMC_MAJOR=$(grep 'set(MeshMC_VERSION_MAJOR' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_MINOR=$(grep 'set(MeshMC_VERSION_MINOR' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_HOTFIX=$(grep 'set(MeshMC_VERSION_HOTFIX' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_VER="${MESHMC_MAJOR}.${MESHMC_MINOR}.${MESHMC_HOTFIX}"

          # Extract neozip version from zlib.h.in
          NEOZIP_VER=$(grep '#define NEOZIP_VERSION' neozip/zlib.h.in | sed 's/.*"\(.*\)".*/\1/')

          RELEASE_DATE=$(date -u +%Y-%m-%d)

          cat > components.json <<EOF
          {
            "schema_version": 1,
            "release_tag": "${{ env.VERSION }}",
            "release_date": "${RELEASE_DATE}",
            "components": {
              "meshmc": {
                "version": "${MESHMC_VER}"
              },
              "neozip": {
                "version": "${NEOZIP_VER}"
              }
            }
          }
          EOF

          # Remove leading whitespace from heredoc
          python3 -c "
          import json, sys
          with open('components.json') as f:
              data = json.load(f)
          with open('components.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          echo "=== components.json ==="
          cat components.json

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      # ── MeshMC binary packaging ──────────────────────────────────
      - name: Package MeshMC binary artifacts
        run: |
          # shellcheck disable=SC2086,SC2035
          mv MeshMC-Linux-Qt6-Portable*/MeshMC-portable.tar.gz MeshMC-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv MeshMC-Linux-aarch64-Qt6-Portable*/MeshMC-portable.tar.gz MeshMC-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv MeshMC-*.AppImage/MeshMC-*-x86_64.AppImage MeshMC-Linux-x86_64.AppImage
          mv MeshMC-*.AppImage.zsync/MeshMC-*-x86_64.AppImage.zsync MeshMC-Linux-x86_64.AppImage.zsync
          mv MeshMC-*.AppImage/MeshMC-*-aarch64.AppImage MeshMC-Linux-aarch64.AppImage
          mv MeshMC-*.AppImage.zsync/MeshMC-*-aarch64.AppImage.zsync MeshMC-Linux-aarch64.AppImage.zsync
          mv MeshMC-macOS*/MeshMC.zip MeshMC-macOS-${{ env.VERSION }}.zip
          mv MeshMC-macOS*/MeshMC.dmg MeshMC-macOS-${{ env.VERSION }}.dmg

          for d in MeshMC-Windows-MSVC*; do
            cd "${d}" || continue
            LEGACY="$(echo -n "${d}" | grep -o Legacy || true)"
            ARM64="$(echo -n "${d}" | grep -o arm64 || true)"
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MSVC"
            test -z "${LEGACY}" || NAME="${NAME}-Legacy"
            test -z "${ARM64}" || NAME="${NAME}-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

          for d in MeshMC-Windows-MinGW-w64*; do
            cd "${d}" || continue
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MinGW-w64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

          for d in MeshMC-Windows-MinGW-arm64*; do
            cd "${d}" || continue
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MinGW-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

          # Generate SHA-256 sums for all MeshMC artifacts
          # shellcheck disable=SC2035
          for f in MeshMC-*; do
            [[ -f "$f" ]] || continue
            sha256sum "$f" > "${f}.sha256"
          done

      # ── Release draft ────────────────────────────────────────────
      - name: Create release draft
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref }}
          name: Release ${{ env.VERSION }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            components.json
            MeshMC-Linux-x86_64.AppImage
            MeshMC-Linux-x86_64.AppImage.zsync
            MeshMC-Linux-aarch64.AppImage
            MeshMC-Linux-aarch64.AppImage.zsync
            MeshMC-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
            MeshMC-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz
            MeshMC-Windows-MinGW-w64-${{ env.VERSION }}.zip
            MeshMC-Windows-MinGW-w64-Portable-${{ env.VERSION }}.zip
            MeshMC-Windows-MinGW-w64-Setup-${{ env.VERSION }}.exe
            MeshMC-Windows-MinGW-arm64-${{ env.VERSION }}.zip
            MeshMC-Windows-MinGW-arm64-Portable-${{ env.VERSION }}.zip
            MeshMC-Windows-MinGW-arm64-Setup-${{ env.VERSION }}.exe
            MeshMC-Windows-MSVC-arm64-${{ env.VERSION }}.zip
            MeshMC-Windows-MSVC-arm64-Portable-${{ env.VERSION }}.zip
            MeshMC-Windows-MSVC-arm64-Setup-${{ env.VERSION }}.exe
            MeshMC-Windows-MSVC-${{ env.VERSION }}.zip
            MeshMC-Windows-MSVC-Portable-${{ env.VERSION }}.zip
            MeshMC-Windows-MSVC-Setup-${{ env.VERSION }}.exe
            MeshMC-macOS-${{ env.VERSION }}.zip
            MeshMC-macOS-${{ env.VERSION }}.dmg
            MeshMC-*.sha256
            neozip-*/neozip-*.zip
            meshmc-source-archives/*
            meshmc-without-libraries-source-archives/*
            source-neozip/*
            source-cgit/*
            source-cmark/*
            source-corebinutils/*
            source-forgewrapper/*
            source-genqrcode/*
            source-images4docker/*
            source-json4cpp/*
            source-libnbtplusplus/*
            source-mnv/*
            source-tomlplusplus/*
            source-LocalPeer/*
            source-classparser/*
            source-ganalytics/*
            source-iconfix/*
            source-javacheck/*
            source-javalauncher/*
            source-katabasis/*
            source-optional-bare/*
            source-rainbow/*
            source-systeminfo/*
            source-xz-embedded/*

      # ── Stage deployment bundle ──────────────────────────────────
      - name: Stage deployment bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-bundle

          # MeshMC — packaged binaries (files only, not artifact dirs) + source archives
          mkdir -p deploy-bundle/meshmc
          find . -maxdepth 1 -type f -name 'MeshMC-*' -exec cp {} deploy-bundle/meshmc/ \;
          cp -a meshmc-source-archives/. deploy-bundle/meshmc/

          # NeoZip — binary artifacts + source archives
          mkdir -p deploy-bundle/neozip
          for d in neozip-win-*; do
            [[ -d "$d" ]] || continue
            cp -a "$d"/. deploy-bundle/neozip/
          done
          cp -a source-neozip/. deploy-bundle/neozip/

          # Source-only projects (from package_sources matrix)
          for project in cgit cmark corebinutils forgewrapper genqrcode images4docker json4cpp libnbtplusplus mnv tomlplusplus LocalPeer classparser ganalytics iconfix javacheck javalauncher katabasis optional-bare rainbow systeminfo xz-embedded; do
            if [[ -d "source-${project}" ]]; then
              mkdir -p "deploy-bundle/${project}"
              cp -a "source-${project}"/. "deploy-bundle/${project}/"
            fi
          done

          # Include components.json at root level
          cp components.json deploy-bundle/

          echo "=== Deployment bundle ==="
          find deploy-bundle -type f | sort

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v7
        with:
          name: deploy-bundle
          path: deploy-bundle/
          if-no-files-found: error


  deploy_to_server:
    name: Deploy to FTP Server
    needs: [create_release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set version
        run: echo "VERSION=${{ inputs.version || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Download deployment bundle
        uses: actions/download-artifact@v8
        with:
          name: deploy-bundle
          path: deploy-bundle

      - name: Prepare SSH credentials
        shell: bash
        env:
          FTP_SSH_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_SSH_PORT || '22' }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$FTP_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$FTP_PORT" -H "$FTP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy artifacts to server
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PORT: ${{ secrets.FTP_SSH_PORT || '22' }}
          REMOTE_BASE: /var/www/ftp/Project-Tick
        run: |
          set -euo pipefail

          # Deploy components.json to release base directory
          if [[ -f deploy-bundle/components.json ]]; then
            ssh -p "$FTP_PORT" "$FTP_USER@$FTP_HOST" "mkdir -p '${REMOTE_BASE}'"
            rsync -av --chmod=F644 \
              -e "ssh -p ${FTP_PORT} -o StrictHostKeyChecking=yes" \
              deploy-bundle/components.json \
              "${FTP_USER}@${FTP_HOST}:${REMOTE_BASE}/components-${VERSION}.json"
          fi

          # Deploy per-product artifacts
          for product_dir in deploy-bundle/*/; do
            [[ -d "$product_dir" ]] || continue
            product="$(basename "$product_dir")"
            remote="${REMOTE_BASE}/${product}/releases/download/${VERSION}"

            echo "::group::Deploying ${product} → ${remote}"
            ssh -p "$FTP_PORT" "$FTP_USER@$FTP_HOST" "mkdir -p '${remote}'"
            rsync -av --chmod=D755,F644 \
              -e "ssh -p ${FTP_PORT} -o StrictHostKeyChecking=yes" \
              "${product_dir}" \
              "${FTP_USER}@${FTP_HOST}:${remote}/"
            echo "::endgroup::"
          done
