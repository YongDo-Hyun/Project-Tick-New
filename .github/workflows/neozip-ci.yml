name: "neozip: CI"

on:
  push:
    paths:
      - 'neozip/**'
      - '.github/workflows/neozip-*.yml'
  pull_request:
    paths:
      - 'neozip/**'
      - '.github/workflows/neozip-*.yml'
  workflow_dispatch:

concurrency:
  group: neozip-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # OSB runs first — guards against wasting time on uncompilable code
  osb:
    name: OSB
    uses: ./.github/workflows/neozip-osb.yml
    secrets: inherit

  analyze:
    name: Static Analysis
    needs: osb
    uses: ./.github/workflows/neozip-analyze.yml
    secrets: inherit

  cmake:
    name: CMake
    needs: osb
    uses: ./.github/workflows/neozip-cmake.yml
    secrets: inherit

  codeql:
    name: CodeQL
    needs: osb
    uses: ./.github/workflows/neozip-codeql.yml
    secrets: inherit

  configure:
    name: Configure
    needs: osb
    uses: ./.github/workflows/neozip-configure.yml
    secrets: inherit

  libpng:
    name: Libpng
    needs: osb
    uses: ./.github/workflows/neozip-libpng.yml
    secrets: inherit

  link:
    name: Link
    needs: osb
    uses: ./.github/workflows/neozip-link.yml
    secrets: inherit

  pigz:
    name: Pigz
    needs: osb
    uses: ./.github/workflows/neozip-pigz.yml
    secrets: inherit

  pkgcheck:
    name: Package Check
    needs: osb
    uses: ./.github/workflows/neozip-pkgcheck.yml
    secrets: inherit
