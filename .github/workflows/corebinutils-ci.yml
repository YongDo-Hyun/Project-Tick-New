name: "corebinutils: CI"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: corebinutils

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bmake \
            libbsd-dev \
            libmd-dev \
            musl-tools

      - name: Configure
        run: |
          ./configure

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Test
        run: |
          make test
