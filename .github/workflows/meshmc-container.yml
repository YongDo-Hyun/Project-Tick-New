name: "MeshMC: Container"

concurrency:
  group: meshmc-container-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  workflow_call:

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build (${{ matrix.arch }})

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image-name.outputs.image-name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu-24.04-arm
          - arch: amd64
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Set image name
        id: image-name
        run: |
          echo "image-name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/devcontainer" >> "$GITHUB_OUTPUT"

      - name: Install Podman
        uses: redhat-actions/podman-install@main
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        with:
          github-token: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine metadata for image
        id: image-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.image-name.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/develop' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./meshmc/Containerfile
          tags: ${{ steps.image-metadata.outputs.tags }}
          labels: ${{ steps.image-metadata.outputs.labels }}

      - name: Login to registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Push image (with retry)
        id: push-image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          digest=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            for attempt in 1 2 3 4 5; do
              if podman push --tls-verify=true \
                   --digestfile="$RUNNER_TEMP/digest.txt" \
                   "$tag"; then
                digest="$(cat "$RUNNER_TEMP/digest.txt")"
                break
              fi
              [ "$attempt" = 5 ] && exit 1
              echo "Push attempt $attempt/5 failed for $tag, retrying in 30s..."
              sleep 30
            done
          done <<< "${{ steps.build-image.outputs.tags }}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Export image digest
        if: ${{ github.event_name != 'pull_request' }}
        env:
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          touch "$RUNNER_TEMP"/digests/"${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Create manifest
    needs: [build]
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Install Podman
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        uses: redhat-actions/podman-install@main
        with:
          github-token: ${{ github.token }}

      - name: Login to registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Determine metadata for manifest
        id: manifest-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ needs.build.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/develop' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          # shellcheck disable=SC2046
          while read -r tag; do
            podman manifest create "$tag" \
              $(printf "$IMAGE_NAME@sha256:%s " *)
          done <<< "$DOCKER_METADATA_OUTPUT_TAGS"

      - name: Push manifest
        uses: redhat-actions/push-to-registry@v2
        with:
          tags: ${{ steps.manifest-metadata.outputs.tags }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
          tls-verify: true
