name: "libnbtplusplus: CI"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shared: [ON, OFF]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cxxtest (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cxxtest

      - name: Install cxxtest (macOS)
        if: runner.os == 'macOS'
        run: brew install cxxtest
      
      - name: Build and install monorepo libraries (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          # External dependencies from monorepo
          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF

      - name: Build and install monorepo libraries (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64;x86_64 -DCMAKE_PREFIX_PATH=$(brew --prefix libarchive)"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Configure
        if: runner.os != 'Windows'
        run: |
          cmake -S libnbtplusplus -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=ON \
            -DNBT_BUILD_TESTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S libnbtplusplus -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=OFF \
            -DNBT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release -j2

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  lint-reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v6
