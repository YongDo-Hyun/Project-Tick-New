# tickborg — Distributed CI for Project Tick
# Usage: docker compose up -d
#
# First, create the .env file:
#   cp .env.example .env
#   # Fill in the values in .env
#
# Create a GitHub App:
#   1. https://github.com/settings/apps/new
#   2. Webhook URL: https://<DOMAIN>:9899/github-webhooks
#   3. Permissions: Pull requests (R/W), Commit statuses (R/W),
#      Issues (R/W), Contents (Read), Checks (R/W)
#   4. Events: Pull request, Issue comment, Check run, Push
#   5. Download the private key → secrets/github-app.private-key.pem

services:
  # ── Infrastructure ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    hostname: tickborg-rabbit
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: tickborg
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq-password
      RABBITMQ_DEFAULT_VHOST: tickborg
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    secrets:
      - rabbitmq-password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Webhook Receiver (GitHub → RabbitMQ) ─────────────────
  webhook-receiver:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["github-webhook-receiver", "/etc/tickborg/config.json"]
    ports:
      - "9899:9899"
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Evaluation Filter (PR → eval queue) ──────────────────
  evaluation-filter:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["evaluation-filter", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Comment Filter (@tickbot commands) ───────────────────
  comment-filter:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["github-comment-filter", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Comment Poster (post results to GitHub) ──────────────
  comment-poster:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["github-comment-poster", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Mass Rebuilder (eval + rebuild orchestration) ────────
  mass-rebuilder:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["mass-rebuilder", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
      - checkout_data:/var/lib/tickborg/checkout
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Builder (main build worker — scalable) ────────────────
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["builder", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
      - checkout_data:/var/lib/tickborg/checkout
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 2  # Increase as needed
    restart: unless-stopped

  # ── Log Collector ────────────────────────────────────────
  log-collector:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["log-message-collector", "/etc/tickborg/config.json"]
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
      - log_data:/var/lib/tickborg/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Log API (serve build logs) ────────────────────────────
  logapi:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["logapi", "/etc/tickborg/config.json"]
    ports:
      - "8082:8082"
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - log_data:/var/lib/tickborg/logs:ro
    restart: unless-stopped

  # ── Prometheus Metrics ───────────────────────────────────
  stats:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["stats", "/etc/tickborg/config.json"]
    ports:
      - "9898:9898"
    volumes:
      - ./config.json:/etc/tickborg/config.json:ro
      - ./secrets:/run/secrets/tickborg:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_data:
  checkout_data:
  log_data:

secrets:
  rabbitmq-password:
    file: ./secrets/rabbitmq-password
